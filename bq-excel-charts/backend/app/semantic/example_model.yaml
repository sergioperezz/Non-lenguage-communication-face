# Modelo semántico de ejemplo (cartera de inversión).
# Copia y adapta a tus tablas reales de BigQuery.
#
# La UI se construye SOLA a partir de esto:
#  - `selectors`  -> desplegables de configuración (en cascada vía applies_to)
#  - `dimensions` -> ejes para agrupar / fechas
#  - `measures`   -> métricas; `applies_to` controla cuándo aparece cada una

datasets:
  - name: portfolio
    label: Cartera
    table: my-project.finance.positions   # <-- proyecto.dataset.tabla reales
    description: Posiciones de la cartera por fecha y activo
    max_bytes_billed: 1000000000          # 1 GB de tope por consulta

    selectors:
      - name: asset_class
        label: Tipo de activo
        column: asset_class
        options:
          - { value: fixed_income, label: Renta fija }
          - { value: equity, label: Renta variable }

    dimensions:
      - name: date
        label: Fecha
        sql: as_of_date
        type: date
      - name: sector
        label: Sector
        sql: sector
        type: string
      - name: issuer
        label: Emisor
        sql: issuer
        type: string
      # Solo tiene sentido para renta fija:
      - name: rating
        label: Rating
        sql: rating
        type: string
        applies_to:
          asset_class: [fixed_income]

    measures:
      # Disponibles siempre (cualquier tipo de activo):
      - name: market_value
        label: Valor de mercado
        sql: SUM(market_value)
        format: "#,##0"
      - name: weight
        label: Peso (%)
        sql: SUM(weight)
        format: "0.00%"

      # Solo Renta fija:
      - name: duration
        label: Duración
        sql: AVG(duration)
        format: "0.00"
        applies_to:
          asset_class: [fixed_income]
      - name: ytm
        label: TIR
        sql: AVG(yield_to_maturity)
        format: "0.00%"
        applies_to:
          asset_class: [fixed_income]
      - name: spread
        label: Spread (pb)
        sql: AVG(spread_bps)
        format: "#,##0"
        applies_to:
          asset_class: [fixed_income]

      # Solo Renta variable:
      - name: pe_ratio
        label: PER
        sql: AVG(pe_ratio)
        format: "0.00"
        applies_to:
          asset_class: [equity]
      - name: dividend_yield
        label: Rentab. por dividendo
        sql: AVG(dividend_yield)
        format: "0.00%"
        applies_to:
          asset_class: [equity]
